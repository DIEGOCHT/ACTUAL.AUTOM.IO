<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

svg{
    width:100%;
    height:100%;
}
</style>

</head>

<body>

<div id="mensajeMovil" style="
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.85);
    color:white;
    padding:15px 20px;
    border-radius:10px;
    text-align:center;
    font-family:Arial,sans-serif;
    font-size:14px;
    z-index:9999;
    max-width:80%;
">
    📢 Para visualizar el estado de los lotes<br>
    <b>(LIBRE, RESERVADO o VENDIDO)</b><br>
    ingrese al tour desde una computadora.
</div>

<svg viewBox="0 0 100 100" preserveAspectRatio="none">

```
<rect
    id="fondo"
    x="0"
    y="0"
    width="100"
    height="100"
    fill="#FFFFFF"
    fill-opacity="0">
</rect>
```

</svg>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxHHlu-hBr8ytcu084bJ3ebxniyXoEI-vOG0wWvGGBIPmjkeX0hU6-BIbeRvIaNgAQYdg/exec";

const params = new URLSearchParams(window.location.search);
const LOTE = params.get("lote");

const fondo = document.getElementById("fondo");

/* Detectar celular */
const esMovil =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i
    .test(navigator.userAgent);

async function actualizarColor(){

    try{

        const response = await fetch(
            API_URL + "?t=" + Date.now(),
            {
                cache: "no-store"
            }
        );

        const datos = await response.json();

        const fila = datos.find(item => {

            const idLote = String(item.ID_LOTE || "")
                .trim()
                .replace(/\s+/g," ");

            const loteBuscado = String(LOTE || "")
                .trim()
                .replace(/\s+/g," ");

            return idLote === loteBuscado;

        });

        if(!fila){
            return;
        }

        const color =
            String(fila.COLOR || "FFFF00")
            .replace("#","")
            .trim();

        const opacidad =
            String(fila.OPACIDAD || "0.30")
            .trim();

        fondo.setAttribute(
            "fill",
            "#" + color
        );

        fondo.setAttribute(
            "fill-opacity",
            opacidad
        );

    }
    catch(error){

        console.error(error);

    }

}

/* SOLO COMPUTADORA */
if(!esMovil){

    actualizarColor();

    setInterval(
        actualizarColor,
        5000
    );

}
else{

    console.log(
        "Modo móvil: actualización desactivada"
    );

    document.getElementById(
        "mensajeMovil"
    ).style.display = "block";

    setTimeout(() => {

        document.getElementById(
            "mensajeMovil"
        ).style.display = "none";

    }, 5000);

}

</script>

</body>
</div>
</html>
